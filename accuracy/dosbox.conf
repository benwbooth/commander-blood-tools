# DOSBox-X config for the Commander Blood accuracy oracle.
# Boots the real game from the CD image so generated cutscenes can be compared
# against ground truth. Runs on an isolated Xvfb display (see run_oracle.sh) so
# it never touches the user's desktop.

[sdl]
output       = surface
autolock     = false
waitonerror  = false

[dosbox]
machine      = svga_s3
captures     = captures
memsize      = 16

[cpu]
core         = auto
cputype      = auto
cycles       = max

[sblaster]
sbtype       = sb16

[render]
aspect       = true

[autoexec]
@echo off
mount C "CDRIVE_PLACEHOLDER"
imgmount D "ISO_PATH_PLACEHOLDER" -t iso -fs iso
D:
REM Try the main program directly (the BLOOD.EXE launcher only wants an installer).
BLOODPRG.EXE

# DOSBox-X config for the Commander Blood accuracy oracle.
# Boots the real game from the CD image so generated cutscenes can be compared
# against ground truth. Runs on an isolated Xvfb display (see run_oracle.sh) so
# it never touches the user's desktop.

[sdl]
output       = surface
autolock     = false
waitonerror  = false

[dosbox]
machine      = svga_s3
captures     = captures
memsize      = 64

[cpu]
core         = auto
cputype      = auto
cycles       = max

[sblaster]
sbtype       = sb16

[gus]
gus          = true

[render]
aspect       = true

[autoexec]
@echo off
mount C "CDRIVE_PLACEHOLDER"
imgmount D "ISO_PATH_PLACEHOLDER" -t iso -fs iso
REM BLOODPRG.EXE MUST be run with the real launch arguments or it only plays the
REM attract/intro demo and never enters interactive gameplay. Recovered from the
REM eXoDOS install's cblood/BLOOD.BAT: AMR (region), S162227 (SoundBlaster-16
REM config), EMS (use EMS), WRIC:\cblood\ (writable save path). C:\cblood\ must
REM exist for saves (blood.sav / game1..10.sav). See re/REVERSE.md "LAUNCH ARGS".
C:
if not exist cblood md cblood
D:
BLOODPRG AMR S162227 EMS WRIC:\cblood\
